version: '3.8'

services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: attendance_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: attendance_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./attendance-backend/migrations:/docker-entrypoint-initdb.d
    networks:
      - attendance_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Optional: pgAdmin for database management
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: attendance_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@attendance.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    networks:
      - attendance_network
    depends_on:
      - postgres

volumes:
  postgres_data:

networks:
  attendance_network:
    driver: bridge
